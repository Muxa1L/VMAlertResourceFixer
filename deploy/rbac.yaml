apiVersion: v1
kind: ServiceAccount
metadata:
  name: vmalert-resource-fixer
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vmalert-resource-fixer
rules:
  - apiGroups: ["operator.victoriametrics.com"]
    resources: ["vmalerts"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vmalert-resource-fixer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vmalert-resource-fixer
subjects:
  - kind: ServiceAccount
    name: vmalert-resource-fixer
    namespace: monitoring